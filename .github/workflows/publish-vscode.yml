name: Publish VS Code Extension

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Lint
        working-directory: vscode-extension
        run: npm run lint

      - name: Build
        working-directory: vscode-extension
        run: npm run build

      - name: Publish to VS Code Marketplace
        working-directory: vscode-extension
        run: npx --no-install vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Bump patch version for next release
        working-directory: vscode-extension
        run: npm version patch --no-git-tag-version

      - name: Create bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(vscode): bump version after marketplace publish"
          branch: chore/vscode-version-bump
          delete-branch: true
          title: "chore(vscode): bump version after marketplace publish"
          body: Automated patch bump after publishing to VS Code Marketplace.
          add-paths: |
            vscode-extension/package.json
