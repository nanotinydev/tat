name: Publish VS Code Extension

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Require dispatch from main
        if: github.ref_name != 'main'
        run: |
          echo "::error::This workflow must be run from main. Selected ref: ${GITHUB_REF_NAME}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require release PR token
        env:
          RELEASE_PR_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          if [ -z "$RELEASE_PR_TOKEN" ]; then
            echo "::error::Missing RELEASE_PR_TOKEN secret. Configure a PAT or GitHub App token that can create pull requests and trigger CI."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run verify

      - name: Publish to VS Code Marketplace
        working-directory: vscode-extension
        run: npx --no-install vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Bump patch version for next release
        working-directory: vscode-extension
        run: npm version patch --no-git-tag-version

      - name: Create bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}
          commit-message: "chore(vscode): bump version after marketplace publish"
          base: main
          branch: chore/vscode-version-bump
          delete-branch: true
          title: "chore(vscode): bump version after marketplace publish"
          body: Automated patch bump after publishing to VS Code Marketplace.
          add-paths: |
            package-lock.json
            vscode-extension/package.json
            vscode-extension/package-lock.json
