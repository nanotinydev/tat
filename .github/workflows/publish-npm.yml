name: Publish npm package

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies for Linux runner
        working-directory: tat-cli
        run: |
          rm -f package-lock.json
          npm install --no-package-lock

      - name: Lint
        working-directory: tat-cli
        run: npm run lint

      - name: Test
        working-directory: tat-cli
        run: npm test

      - name: Build
        working-directory: tat-cli
        run: npm run build

      - name: Publish to npm
        working-directory: tat-cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump patch version for next release
        working-directory: tat-cli
        run: npm version patch --no-git-tag-version

      - name: Create bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump version after npm publish"
          branch: chore/npm-version-bump
          delete-branch: true
          title: "chore: bump version after npm publish"
          body: Automated patch bump after publishing the npm package.
          add-paths: |
            tat-cli/package.json
